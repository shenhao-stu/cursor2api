name: Sync upstream and deploy to HuggingFace Space

on:
  schedule:
    # Sync upstream every 2 days
    - cron: '23 3 */2 * *'
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/7836246/cursor2api.git || true
          git fetch upstream main
          git checkout main
          git reset --hard upstream/main
          git push origin main --force

      - name: Prepare minimal HF Space deployment
        run: |
          # Remove non-essential files for HF Space
          rm -rf test/ vue-ui/ refs/ .cursor/ .github/ .vscode/ .idea/
          rm -f deploy.sh docker-compose.yml config.yaml config.yaml.example CHANGELOG.md LICENSE
          rm -f *.zip *.tar.gz *.log

          # Extract version from package.json
          VERSION=$(node -p "require('./package.json').version")

          # Create HF Space README with proper frontmatter
          cat > README.md <<'EOF'
---
title: Cursor2API
emoji: 🔀
colorFrom: blue
colorTo: indigo
sdk: docker
app_port: 3010
license: mit
---

# Cursor2API v${VERSION}

Cursor Docs AI → Anthropic & OpenAI API Proxy

Auto-synced from [7836246/cursor2api](https://github.com/7836246/cursor2api)
EOF
          # Interpolate version
          sed -i "s/\${VERSION}/$VERSION/" README.md

      - name: Deploy to HuggingFace Space (orphan push)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "sync: upstream $(git log upstream/main -1 --format='%h %s')"
          git remote add huggingface https://ohmyapi:${HF_TOKEN}@huggingface.co/spaces/ohmyapi/cursor2api || true
          git push huggingface hf-deploy:main --force
